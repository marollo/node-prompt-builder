<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node Prompt Builder</title>
    <!-- LiteGraph built-in styles — required for menus, dialogs, and search box -->

  </body>
</html>
